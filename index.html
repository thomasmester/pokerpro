<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokerPro - Calculadora de Deudas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>PokerPro</h1>
      <p class="subtitle">Calculadora de deudas para poker entre amigos</p>
    </header>

    <div class="gallery">
      <div class="gallery-track" id="gallery-track">
        <div class="gallery-slide">
          <img src="WhatsApp Image 2026-04-28 at 17.25.29.jpeg" alt="pensando" />
        </div>
        <div class="gallery-slide">
          <img src="WhatsApp Image 2026-04-28 at 17.28.14.jpeg" alt="maradona" />
        </div>
        <div class="gallery-slide">
          <img src="WhatsApp Image 2026-05-08 at 10.21.16.jpeg" alt="jorgelin" />
        </div>
      </div>
      <div class="gallery-dots" id="gallery-dots">
        <span class="dot active" data-i="0"></span>
        <span class="dot" data-i="1"></span>
        <span class="dot" data-i="2"></span>
      </div>
    </div>

    <section class="setup-section card" id="setup-section">
      <h2>Configuracion de la partida</h2>
      <div class="form-row">
        <label for="buy-in">Buy-in por jugador ($)</label>
        <input type="number" id="buy-in" min="0" step="0.01" placeholder="ej: 1000" />
      </div>
      <div class="form-row">
        <label for="initial-points">Puntos iniciales por jugador</label>
        <input type="number" id="initial-points" min="1" step="1" placeholder="ej: 100" />
      </div>
      <div class="form-row">
        <label for="player-count">Cantidad de jugadores</label>
        <input type="number" id="player-count" min="2" max="20" placeholder="ej: 4" />
      </div>
      <button class="btn btn-primary" id="setup-btn">Crear mesa</button>
    </section>

    <section class="players-section card hidden" id="players-section">
      <h2>Jugadores</h2>
      <div class="game-info" id="game-info"></div>
      <div id="players-list"></div>
      <button class="btn btn-secondary" id="add-player-btn">+ Agregar jugador</button>
      <div class="divider"></div>
      <button class="btn btn-primary" id="calculate-btn">Calcular deudas</button>
      <button class="btn btn-ghost" id="reset-btn">Reiniciar</button>
    </section>

    <section class="results-section card hidden" id="results-section">
      <h2>Resumen de la partida</h2>
      <div id="balances-table"></div>
      <div class="divider"></div>
      <h2>Transferencias (minimas)</h2>
      <div id="transfers-list"></div>
      <button class="btn btn-ghost" id="back-btn">Volver a editar</button>
      <button class="btn btn-ghost" id="new-game-btn">Nueva partida</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
